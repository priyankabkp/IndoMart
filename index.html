<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<title>IndoMart</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->

<header class="navbar">

<div class="logo">
<img src="logo.jpg.png">
<h2>IndoMart</h2>
</div>

<input type="text" id="search" placeholder="Search products...">

<div class="cart">
<a href="cart.html" class="cart-link">
🛒 Cart <span id="cart-count">1</span></a>

<a href="wishlist.html">❤️ Wishlist</a>
</div>

</header>


<!-- HERO SECTION -->

<section class="hero">

<div class="hero-text">

<h1>STYLE</h1>
<h2>That Defines</h2>
<h3>YOU</h3>



<button onclick="scrollProducts()">Shop Now</button>

</div>

</section>


<!-- CATEGORY FILTER -->

<section class="filters">

<button onclick="filterProducts('all')">All</button>

<button onclick="filterProducts('saree')">Saree</button>

<button onclick="filterProducts('jewellery')">Jewellery</button>

<button onclick="filterProducts('tshirt')">T-Shirt</button>

</section>


<!-- PRODUCT SECTION -->

<section class="products" id="product-list"></section>


<!-- CONTACT SECTION -->

<section class="contact">

<h2>Contact Us</h2>

<p><strong>Address:</strong>Unit-1, Bhubaneswar-751009, Odisha, India</p>


<p><strong>Email:</strong> support@indomart.com</p>


</section>


<!-- FOOTER -->

<footer>

<p>© 2026 IndoMart. All Rights Reserved.</p>

</footer>

<script src="script.js"></script>

</body>
</html>
